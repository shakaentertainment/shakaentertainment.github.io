<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shaka Entertainmentr</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-gradient"></div>
    <header>
        <img src="logo.png" alt="SHAKA ENTERTAINMENT" id="logo">
        <form id="search-form">
            <input id="search-input" type="text" placeholder="Search for movies...">
            <button type="submit">Search</button>
        </form>
    </header>
    <main>
        <section id="popular-movies" class="movie-section">
            <h2>Popular Movies</h2>
            <div id="popular-movies-container" class="carousel"></div>
        </section>
        <section id="top-rated-movies" class="movie-section">
            <h2>Top Rated</h2>
            <div id="top-rated-movies-container" class="carousel"></div>
        </section>
        <section id="upcoming-movies" class="movie-section">
            <h2>Upcoming</h2>
            <div id="upcoming-movies-container" class="carousel"></div>
        </section>
        <section id="search-results" class="movie-section hidden">
            <h2>Search Results</h2>
            <div id="search-results-container" class="carousel"></div>
        </section>
    </main>
    <footer>
        <p>Made with ❤️ | Movie Explorer 2025</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
